{% extends "base.html" %}
{% block content %}

<div class="form-wrap">
    <h1 class="page-title">Forgot Password</h1>
    <p style="margin-bottom:1.5rem;color:#555">Enter your email and we'll send you a reset link if an account exists.</p>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com">
    </div>

    <button class="btn btn-primary" onclick="doForgot()" id="forgotBtn">Send Reset Link</button>

    <div class="form-footer">
        <p><a href="/login">Back to login</a></p>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
async function doForgot() {
    hideAlert();
    const email = document.getElementById('email').value.trim();
    if (!email) { showAlert('Email is required.'); return; }

    const btn = document.getElementById('forgotBtn');
    btn.textContent = 'Sending...';
    btn.disabled = true;

    const res = await apiFetch('/api/users/forgot-password', {
        method: 'POST',
        body: JSON.stringify({ email })
    });

    if (res.ok || res.status === 202) {
        showAlert('If an account exists with that email, a reset link has been sent.', 'success');
    } else {
        showAlert('Something went wrong. Please try again.');
    }
    btn.textContent = 'Send Reset Link';
    btn.disabled = false;
}
</script>
{% endblock %}
