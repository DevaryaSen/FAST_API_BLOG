{% extends "base.html" %}
{% block content %}

<div class="form-wrap">
    <h1 class="page-title">Login</h1>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
    </div>

    <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">Login</button>

    <div class="form-footer" style="margin-top:1rem">
        <p><a href="/forgot-password">Forgot password?</a></p>
        <p>No account? <a href="/register">Register</a></p>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    if (isLoggedIn()) window.location.href = '/';
    document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
    });
});

async function doLogin() {
    hideAlert();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { showAlert('Email and password are required.'); return; }

    const btn = document.getElementById('loginBtn');
    btn.textContent = 'Logging in...';
    btn.disabled = true;

    const body = new URLSearchParams({ username: email, password });
    const res = await fetch('/api/users/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body
    });

    if (res.ok) {
        const data = await res.json();
        setToken(data.access_token);
        window.location.href = '/';
    } else {
        const data = await res.json();
        showAlert(data.detail || 'Login failed. Check your credentials.');
        btn.textContent = 'Login';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
