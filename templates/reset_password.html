{% extends "base.html" %}
{% block content %}

<div class="form-wrap">
    <h1 class="page-title">Reset Password</h1>

    <div class="form-group">
        <label for="newPwd">New Password</label>
        <input type="password" id="newPwd" placeholder="Min 8 characters">
    </div>
    <div class="form-group">
        <label for="confirmPwd">Confirm Password</label>
        <input type="password" id="confirmPwd" placeholder="Repeat new password">
    </div>

    <button class="btn btn-primary" onclick="doReset()" id="resetBtn">Reset Password</button>

    <div class="form-footer">
        <p><a href="/login">Back to login</a></p>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function getTokenParam() {
    return new URLSearchParams(window.location.search).get('token') || '';
}

async function doReset() {
    hideAlert();
    const token   = getTokenParam();
    const newPwd  = document.getElementById('newPwd').value;
    const confirm = document.getElementById('confirmPwd').value;

    if (!token) { showAlert('Invalid or missing reset token.'); return; }
    if (!newPwd || newPwd.length < 8) { showAlert('Password must be at least 8 characters.'); return; }
    if (newPwd !== confirm) { showAlert('Passwords do not match.'); return; }

    const btn = document.getElementById('resetBtn');
    btn.textContent = 'Resetting...';
    btn.disabled = true;

    const res = await apiFetch('/api/users/reset-password', {
        method: 'POST',
        body: JSON.stringify({ token, new_password: newPwd })
    });

    if (res.ok) {
        showAlert('Password reset successfully. Redirecting to login...', 'success');
        setTimeout(() => window.location.href = '/login', 2000);
    } else {
        const d = await res.json();
        showAlert(d.detail || 'Reset failed. The link may have expired.');
        btn.textContent = 'Reset Password';
        btn.disabled = false;
    }
}
</script>
{% endblock %}
